apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: devto-dedup
  labels:
    app: surrealdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      nodeSelector:
        kubernetes.io/hostname: mgplcb05
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:v2.1.4
          args:
            - start
            - --log=info
            - --user=$(SURREAL_USER)
            - --pass=$(SURREAL_PASS)
            - --bind=0.0.0.0:8000
            - file:///data/devto.db
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-creds
                  key: username
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-creds
                  key: password
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: surrealdb-devto-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: devto-dedup
spec:
  selector:
    app: surrealdb
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
